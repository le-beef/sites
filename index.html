<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Eventos</title>
  <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h3>🔐 Acesso</h3>
    <input type="password" id="senhaEntrada" placeholder="Senha">
    <button onclick="verificarLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h2>📌 Meus Eventos</h2>

  <div id="formBox" class="form-box">
    <input id="titulo" placeholder="Título">
    <input id="link" placeholder="Link">
    <input type="datetime-local" id="data">
    <input id="descricao" placeholder="Descrição">
    <input type="password" id="senhaAcao" placeholder="Senha para salvar">

    <button onclick="salvar()">Salvar</button>
    <button onclick="toggleForm()">Cancelar</button>
  </div>

  <div id="lista"></div>

  <button class="novo-btn" onclick="toggleForm()">+</button>
</div>

<!-- FIREBASE SEM MODULE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
